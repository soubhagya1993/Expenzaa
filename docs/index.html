<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenzaa — Smart Expense Tracking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:      #2EC4B6;
      --teal-dark: #1AA898;
      --bg:        #F4F5FA;
      --text:      #1E2A3A;
      --muted:     #7B8794;
      --border:    #EEF0F6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 96px; height: 96px;
      background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
      border-radius: 28px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(46,196,182,0.3);
    }
    .logo svg { width: 52px; height: 52px; }

    h1 { font-size: 40px; font-weight: 800; letter-spacing: 1px; }
    .tagline {
      margin-top: 10px;
      font-size: 18px;
      color: var(--muted);
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 40px;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: linear-gradient(135deg, var(--teal), var(--teal-dark));
      color: #fff;
      box-shadow: 0 4px 16px rgba(46,196,182,0.3);
    }
    .btn-outline {
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    footer {
      margin-top: 60px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="7" width="20" height="14" rx="3" stroke="white" stroke-width="1.8"/>
      <path d="M16 7V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2" stroke="white" stroke-width="1.8"/>
      <circle cx="17" cy="14" r="2" fill="white"/>
    </svg>
  </div>

  <h1>Expenzaa</h1>
  <p class="tagline">Smart expense tracking — on your device, under your control.</p>

  <div class="links">
    <a class="btn btn-primary" href="https://apps.apple.com" target="_blank" rel="noopener">
      App Store
    </a>
    <a class="btn btn-outline" href="/Expenzaa/privacy-policy">
      Privacy Policy
    </a>
    <a class="btn btn-outline"
       href="https://github.com/soubhagya1993/Expenzaa"
       target="_blank" rel="noopener">
      GitHub
    </a>
  </div>

  <footer>
    <p>© 2026 Expenzaa. All rights reserved.</p>
  </footer>

</body>
</html>
